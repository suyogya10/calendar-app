version: "3.9"

services:
  # Backend: Laravel Application using PHP-Nginx combined image
  backend:
    image: webdevops/php-nginx:8.4
    container_name: kioch-dashboard-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8090}:80"
    volumes:
      - ./backend:/app
    environment:
      # PHP/Nginx Config
      - WEB_DOCUMENT_ROOT=/app/public
      - PHP_DATE_TIMEZONE=Asia/Kathmandu
      
      # Laravel Environment
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_KEY=${APP_KEY}
      
      # Database Connection (Connecting to shared-mysql)
      - DB_CONNECTION=mysql
      - DB_HOST=shared-mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-calendar_app}
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:-Hamilton#44}
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - shared-net

  # Frontend: Next.js Application (Built from Dockerfile for production)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kioch-dashboard-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8091}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://dashboard.kioch.org/api}
      - NODE_ENV=production
    deploy:
      resources:
        limits:
          memory: 2048M  
    networks:
      - shared-net

networks:
  shared-net:
    external: true
