version: '3.8'

services:
  # Database Service
  db:
    image: mysql:8.0
    container_name: dashboard-db
    restart: unless-stopped
    environment:
      - MYSQL_DATABASE=dashboard_app
      - MYSQL_ROOT_PASSWORD=Hamilton#44
      - MYSQL_PASSWORD=Hamilton#44
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - calendar-network

  # Backend Service (Laravel PHP-FPM)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dashboard-backend
    restart: unless-stopped
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=dashboard_app
      - DB_USERNAME=root
      - DB_PASSWORD=Hamilton#44
    volumes:
      - ./backend:/var/www
    networks:
      - calendar-network
    depends_on:
      - db

  # Nginx Service (Web Server for Backend)
  nginx:
    image: nginx:alpine
    container_name: dashboard-nginx
    restart: unless-stopped
    volumes:
      - ./backend:/var/www
      - ./backend/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - calendar-network
    depends_on:
      - backend

  # Frontend Service (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dashboard-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=https://dashboard.kioch.org.np/api
    networks:
      - calendar-network
    depends_on:
      - backend

networks:
  calendar-network:
    driver: bridge

volumes:
  db_data:
